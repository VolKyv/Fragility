name: fragility-signals research run

# Manual trigger any time from the Actions tab, plus an optional weekly
# scheduled run.
on:
  workflow_dispatch: {}
  schedule:
    # 21:30 UTC Friday, after the US close, once a week.
    - cron: "30 21 * * 5"

jobs:
  run-research:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build S&P 500 universe
        run: python -m scripts.build_universe

      - name: Run synthetic-data tests (no network required)
        run: python -m pytest tests/ -v

      - name: Run research pipeline
        run: python -m src.run_research

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: fragility-signals-results
          path: |
            output/results.csv
            output/results_robustness.csv
          retention-days: 90
          if-no-files-found: warn
